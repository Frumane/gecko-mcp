name: Release

# Publishes to npm with provenance when a v* tag is pushed, so the npm page links
# to the exact source commit + CI run that built the package (verifiable supply chain).
# One-time setup: add an npm automation token as the repo secret NPM_TOKEN.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm (with provenance)
        # `secrets` can't be used in a job/step `if`, so guard inside the run step:
        # cleanly skips if NPM_TOKEN isn't configured instead of failing the build.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."
            exit 0
          fi
          npm publish --provenance --access public
      - name: Publish to the official MCP Registry (OIDC)
        # Lists gecko-mcp in registry.modelcontextprotocol.io using GitHub Actions
        # OIDC — no secret needed. Ownership of the io.github.frumane namespace is
        # proven by the OIDC token (repo owner == Frumane). Validates server.json
        # against the npm package's mcpName field.
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
